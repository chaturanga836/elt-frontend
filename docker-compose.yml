services:
  frontend:
    container_name: etl-frontend
    build:
      context: .
      args:
        - NEXT_PUBLIC_BUILD_ID=${NEXT_PUBLIC_BUILD_ID:-development}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_KC_URL=${NEXT_PUBLIC_KC_URL}
        - NEXT_PUBLIC_KC_REALM=${NEXT_PUBLIC_KC_REALM}
        - NEXT_PUBLIC_KC_CLIENT_ID=${NEXT_PUBLIC_KC_CLIENT_ID}
    image: etl-frontend-image:${NEXT_PUBLIC_BUILD_ID:-latest}
    expose:
      - "3000"
    volumes:
      - next_build_cache:/app/.next/cache
    restart: unless-stopped
    networks:
      - elt-frontend-net

  proxy:
    container_name: elt-frontend-proxy
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl.conf:/etc/nginx/conf.d/ssl.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/acme:/var/www/letsencrypt:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - frontend
    networks:
      - elt-frontend-net

networks:
  elt-frontend-net:
    driver: bridge

volumes:
  next_build_cache:
